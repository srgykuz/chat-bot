services:
  redis:
    image: redis:8.8-alpine
    volumes:
      - ./redis_data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      start_interval: 1s
      retries: 3

  app:
    build: .
    ports:
      - 8000:8000
    volumes:
      - ./llm:/app/llm:ro
      - ./llm.d:/app/llm.d:ro
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: python -m src.worker
    volumes:
      - ./llm:/app/llm:ro
      - ./llm.d:/app/llm.d:ro
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    depends_on:
      redis:
        condition: service_healthy
